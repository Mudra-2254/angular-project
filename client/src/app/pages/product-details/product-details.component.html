<!-- ═══════ PRODUCT DETAILS — LUXURY EXPERIENCE ═══════ -->
<section *ngIf="product" class="py-20 relative overflow-hidden min-h-screen">

    <!-- Background glow -->
    <div class="absolute w-[400px] h-[400px] bg-primary-500 rounded-full top-20 -right-40 opacity-[0.04] blur-[140px] animate-morph"></div>
    <div class="absolute w-[300px] h-[300px] bg-secondary-500 rounded-full bottom-20 -left-20 opacity-[0.03] blur-[100px]"></div>

    <div class="max-w-6xl mx-auto px-6">

        <!-- Back Link -->
        <a routerLink="/products"
           class="inline-flex items-center gap-3 mb-10 text-sm font-medium text-slate-400 hover:text-primary-400 transition-all duration-300 group animate-fade-in-down"
           style="font-family: 'Inter', sans-serif;">
            <span class="w-8 h-8 rounded-full bg-white/[0.04] border border-white/[0.06] flex items-center justify-center group-hover:-translate-x-1 transition-transform">←</span>
            Back to Collection
        </a>


        <!-- Product Card -->
        <div class="bg-card/60 backdrop-blur-xl border border-white/[0.06] rounded-[2rem] shadow-2xl overflow-hidden animate-scale-in">

            <div class="grid md:grid-cols-2">

                <!-- Image -->
                <div class="relative flex items-center justify-center p-10 bg-gradient-to-br from-slate-900 to-slate-800 overflow-hidden group">
                    <!-- Decorative ring -->
                    <div class="absolute w-[300px] h-[300px] rounded-full border border-primary-500/10 animate-spin-slow"></div>

                    <img
                        [src]="product.image"
                        [alt]="product.pname"
                        class="relative max-h-[400px] object-contain rounded-2xl transform group-hover:scale-105 transition-transform duration-700 z-10">

                    <!-- Shimmer effect -->
                    <div class="absolute inset-0 animate-shimmer pointer-events-none"></div>
                </div>


                <!-- Details -->
                <div class="flex flex-col p-10 md:p-12">

                    <!-- Perfume Badge -->
                    <span class="inline-flex items-center gap-2 px-4 py-1.5 text-[10px] font-semibold tracking-[2px] uppercase text-primary-400 bg-primary-500/8 border border-primary-500/15 rounded-full mb-6 w-fit animate-fade-in-down"
                          style="font-family: 'Inter', sans-serif;">
                        ✨ Luxury Fragrance
                    </span>

                    <!-- Product Name -->
                    <h1 class="mb-5 text-4xl font-light capitalize text-white animate-fade-in-up" style="font-family: 'Cormorant Garamond', serif;">
                        {{ product.pname }}
                    </h1>


                    <!-- Price & Stock -->
                    <div class="flex items-center gap-4 mb-8 animate-fade-in-up" style="animation-delay: 0.15s;">
                        <span class="text-3xl font-bold text-gold-gradient" style="font-family: 'Inter', sans-serif;">
                            ₹{{ product.price * quantity }}
                        </span>
                        <span class="px-3 py-1 text-[10px] font-semibold tracking-wider uppercase bg-green-500/8 text-green-400 border border-green-500/15 rounded-full" style="font-family: 'Inter', sans-serif;">
                            In Stock
                        </span>
                    </div>


                    <!-- Description -->
                    <p class="flex-grow mb-8 leading-relaxed text-slate-400 text-sm animate-fade-in-up" style="animation-delay: 0.2s; font-family: 'Inter', sans-serif;">
                        {{ product.pdesc || 'An exquisite fragrance that embodies elegance and sophistication. Crafted with the finest ingredients for a lasting impression.' }}
                    </p>


                    <!-- Quantity Selector -->
                    <div class="flex items-center gap-5 mb-10 animate-fade-in-up" style="animation-delay: 0.25s;">
                        <span class="text-xs font-medium text-slate-400 tracking-wider uppercase" style="font-family: 'Inter', sans-serif;">
                            Quantity
                        </span>

                        <div class="flex items-center border border-white/[0.08] rounded-xl overflow-hidden bg-white/[0.02]">
                            <button
                                (click)="decreaseQty()"
                                [disabled]="quantity <= 1"
                                class="px-5 py-3 text-lg text-slate-300 hover:bg-white/5 hover:text-primary-400 transition-all disabled:opacity-30 disabled:cursor-not-allowed">
                                −
                            </button>
                            <span class="px-6 py-3 font-bold text-white text-sm border-x border-white/[0.06]" style="font-family: 'Inter', sans-serif;">
                                {{ quantity }}
                            </span>
                            <button
                                (click)="increaseQty()"
                                class="px-5 py-3 text-lg text-slate-300 hover:bg-white/5 hover:text-primary-400 transition-all">
                                +
                            </button>
                        </div>
                    </div>


                    <!-- Action Buttons -->
                    <div class="flex flex-wrap gap-3 mt-auto animate-fade-in-up" style="animation-delay: 0.3s;">

                        <!-- Add to Cart -->
                        <button
                            *ngIf="!alreadyInCart"
                            (click)="addToCart()"
                            [disabled]="addingToCart || addedToCart"
                            class="btn-luxury flex-1 min-w-[160px] py-4 rounded-xl font-semibold text-sm text-white
                                   bg-gradient-to-r from-primary-500 to-primary-600
                                   disabled:opacity-50 disabled:cursor-not-allowed"
                            style="font-family: 'Inter', sans-serif;">
                            <span *ngIf="!addingToCart && !addedToCart">Add To Cart</span>
                            <span *ngIf="addingToCart">Adding...</span>
                            <span *ngIf="addedToCart">✓ Added to Cart</span>
                        </button>

                        <!-- Already in Cart -->
                        <a *ngIf="alreadyInCart"
                            routerLink="/cart"
                            class="flex-1 min-w-[160px] py-4 text-center text-sm font-semibold
                                   bg-white/[0.04] text-primary-300 rounded-xl border border-primary-500/20 hover:bg-primary-500/10 transition-all"
                            style="font-family: 'Inter', sans-serif;">
                            ✓ View Cart
                        </a>

                        <!-- Buy Now -->
                        <button
                            (click)="buyNow()"
                            [disabled]="addingToCart"
                            class="btn-luxury flex-1 min-w-[160px] py-4 rounded-xl font-bold text-sm
                                   bg-white text-slate-900 hover:bg-slate-100 transition-all shadow-xl"
                            style="font-family: 'Inter', sans-serif;">
                            ⚡ Buy Now
                        </button>

                        <!-- Go Back -->
                        <button
                            (click)="goBack()"
                            class="flex-1 min-w-[120px] py-4 text-sm font-semibold
                                   border border-white/[0.08] text-slate-300 rounded-xl
                                   hover:bg-white/[0.04] transition-all"
                            style="font-family: 'Inter', sans-serif;">
                            Go Back
                        </button>
                    </div>

                </div>

            </div>

        </div>

    </div>

</section>
